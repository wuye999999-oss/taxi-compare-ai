<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>价比比</title>
  <style>
    :root{--card:#fff;--muted:#86868b;--line:#e8e8ed;--blue:#0071e3;--shadow:0 16px 48px rgba(0,0,0,.07)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#fff,#f5f5f7 48%,#eee);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;color:#111}button,input{font:inherit}.app{max-width:860px;margin:0 auto;padding:24px 16px 46px}.hero{text-align:center;padding:34px 0 18px}.logo{font-size:54px;font-weight:950;letter-spacing:-2px;margin:0}.sub{color:var(--muted);font-size:16px;line-height:1.5;margin:8px auto 0}.search{display:flex;gap:8px;background:#fff;border-radius:28px;padding:10px;box-shadow:var(--shadow);margin:24px auto 18px;max-width:680px}.search input{flex:1;border:1px solid var(--line);border-radius:20px;padding:15px 16px;font-size:17px;outline:0}.search button,.buy{border:0;background:#111;color:#fff;border-radius:20px;padding:0 22px;font-weight:900}.status{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 14px}.grid{display:grid;gap:14px}.card,.empty{background:var(--card);border:1px solid rgba(255,255,255,.85);box-shadow:var(--shadow);border-radius:28px;padding:20px;margin:0}.head{display:flex;justify-content:space-between;gap:12px}.type{font-size:14px;color:var(--muted);font-weight:800}.result-card h2{font-size:25px;font-weight:950;margin:4px 0 0}.badge{border-radius:999px;background:#f2f2f7;color:#555;font-size:12px;font-weight:900;padding:6px 10px;height:max-content}.price{font-size:52px;font-weight:950;letter-spacing:-1.5px;margin:18px 0 8px}.price small{font-size:21px}.source{color:var(--muted);font-size:14px;line-height:1.45}.spec{display:inline-block;background:#f5f5f7;border:1px solid var(--line);border-radius:14px;padding:7px 10px;margin-top:10px;color:#555;font-size:13px;font-weight:800}.buy{margin-top:14px;background:var(--blue);padding:12px 18px}.buy:disabled{background:#d1d1d6}.platforms,.mini-platforms{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.platform,.mini{border:1px solid var(--line);border-radius:16px;text-align:center;padding:10px;background:#fff}.platform b,.mini b{display:block}.platform span,.mini span{display:block;font-size:12px;color:var(--muted);margin-top:4px}.mini small{display:block;color:#86868b;font-size:11px;margin-top:3px}.ok{color:#14813f!important}.warn{color:#ad6800!important}.empty{text-align:center;color:var(--muted);line-height:1.6}.debug-button{display:block;margin:18px auto 0;border:0;background:transparent;color:#86868b}.debug{display:none;margin-top:14px}.debug.show{display:block}.debug-tools{background:#fff;border-radius:20px;padding:14px}.debug-row{border-top:1px solid var(--line);padding:10px 0;font-size:12px;color:#555}.debug-row.drop b{color:#b00020}.debug-row.keep b{color:#14813f}@media(max-width:560px){.logo{font-size:44px}.platforms,.mini-platforms{grid-template-columns:repeat(2,1fr)}.price{font-size:44px}.search button{padding:0 18px}.app{padding-top:18px}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1 class="logo">价比比</h1>
      <p class="sub">输入商品，自动比较不同平台的真实价格。</p>
      <form id="form" class="search"><input id="keyword" placeholder="输入商品名或粘贴商品链接"><button>比价</button></form>
    </section>
    <div id="status" class="status">正在读取平台状态...</div>
    <main id="summary" class="grid"></main>
    <button id="debugToggle" class="debug-button" type="button">显示调试工具</button>
    <section id="debug" class="debug"></section>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
